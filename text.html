                cities[item.n.toLowerCase()] = {
                    name: item.n,
                    rent: (item.rent / 100) * 2500,
                    food: (item.col / 100) * 800,
                    transport: (item.col / 100) * 150,
                    utilities: (item.col / 100) * 200,
                    risk: Math.round(item.pur > 100 ? 95 : item.pur * 0.9)
                };
            });
            return cities;
        };

        const CITY_DB = generateCityData();

        function App() {
            const [view, setView] = React.useState('single');
            const [income, setIncome] = React.useState(5000);
            const [lifestyle, setLifestyle] = React.useState('Standard');
            const [cityA, setCityA] = React.useState("");
            const [cityB, setCityB] = React.useState("");
            const [isActive, setIsActive] = React.useState(false);

            const multipliers = { Minimalist: 0.6, Standard: 1, Premium: 1.8 };

            const getStats = (id) => {
                if (!id) return null;
                const city = CITY_DB[id];
                const m = multipliers[lifestyle];
                const costs = {
                    rent: Math.round(city.rent * m),
                    food: Math.round(city.food * m),
                    transport: Math.round(city.transport * (lifestyle === 'Minimalist' ? 0.4 : m)),
                    utilities: Math.round(city.utilities)
                };
                const total = costs.rent + costs.food + costs.transport + costs.utilities;
                return { ...costs, total, surplus: income - total, risk: city.risk, rawName: city.name };
            };

            const dataA = getStats(cityA);
            const dataB = getStats(cityB);
            const annualSavingsDiff = (dataA && dataB) ? Math.abs(dataA.surplus - dataB.surplus) * 12 : 0;

            const handleAnalyze = () => {
                if (cityA) setIsActive(true);
            };

            return (
                <div className="max-w-6xl mx-auto p-6 md:p-12">
                    {/* Centered Header */}
                    <header className="flex flex-col items-center mb-12 text-center">
                        <div className="mb-6">
                            <h1 className="text-4xl font-extrabold text-[#2563EB] tracking-tight">ReloSmart<span className="text-slate-300">.ai</span></h1>
                            <p className="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1 italic">Relocation Intelligence System</p>
                        </div>
                        <div className="nav-pill flex shadow-sm">
                            <button onClick={() => {setView('single'); setIsActive(false);}} className={`px-8 py-2 rounded-full text-xs font-bold transition ${view === 'single' ? 'bg-[#2563EB] text-white' : 'text-slate-400'}`}>Single City</button>
                            <button onClick={() => {setView('compare'); setIsActive(false);}} className={`px-8 py-2 rounded-full text-xs font-bold transition ${view === 'compare' ? 'bg-[#2563EB] text-white' : 'text-slate-400'}`}>Compare Cities</button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                        {/* Configuration Sidebar */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="glass-card p-8 space-y-6 border-t-4 border-blue-500">
                                <h3 className="text-[14px] font-black uppercase text-slate-800 tracking-wider mb-8">Configuration</h3>
                                
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase block mb-3">Target City</label>
                                        <select value={cityA} onChange={(e) => {setCityA(e.target.value); setIsActive(false);}} className="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold appearance-none cursor-pointer focus:ring-2 focus:ring-blue-100 outline-none">
                                            <option value="" disabled>e.g. London</option>
                                            {Object.keys(CITY_DB).map(k => <option key={k} value={k}>{CITY_DB[k].name}</option>)}
                                        </select>
                                    </div>

                                    {view === 'compare' && (
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase block mb-3">Comparison City</label>
                                            <select value={cityB} onChange={(e) => {setCityB(e.target.value); setIsActive(false);}} className="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold appearance-none cursor-pointer focus:ring-2 focus:ring-blue-100 outline-none">
                                                <option value="" disabled>Choose second city...</option>
                                                {Object.keys(CITY_DB).map(k => <option key={k} value={k}>{CITY_DB[k].name}</option>)}
                                            </select>
                                        </div>
                                    )}

                                    <button onClick={handleAnalyze} className="w-full py-4 bg-[#2563EB] text-white rounded-2xl font-bold shadow-lg shadow-blue-200 hover:scale-[1.02] active:scale-95 transition-all">
                                        Analyze Relocation
                                    </button>

                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase block mb-3">Monthly Income</label>
                                        <div className="relative">
                                            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">$</span>
                                            <input type="number" value={income} onChange={(e) => setIncome(e.target.value)} className="w-full p-4 pl-8 bg-slate-50 border-none rounded-2xl text-lg font-black outline-none" />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase block mb-3">Lifestyle Mode</label>
                                        <div className="flex bg-slate-100 p-1 rounded-2xl">
                                            {['Minimalist', 'Standard', 'Premium'].map(l => (
                                                <button key={l} onClick={() => setLifestyle(l)} className={`flex-1 py-2 rounded-xl text-[10px] font-bold transition ${lifestyle === l ? 'bg-white shadow-sm text-[#2563EB]' : 'text-slate-400'}`}>{l}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Main Results Dashboard */}
                        <div className="lg:col-span-8 h-full">
                            {!isActive ? (
                                /* Placeholder/Empty State from Image */
                                <div className="placeholder-dashed h-full min-h-[500px] flex flex-col items-center justify-center text-center p-12">
                                    <div className="mb-8 opacity-20">
                                        <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" className="animate-pulse">
                                            <path d="M12 3v3m0 12v3M5 12H2m20 0h-3M18.36 5.64l-2.12 2.12M7.76 16.24l-2.12 2.12M18.36 18.36l-2.12-2.12M7.76 7.76L5.64 5.64" strokeLinecap="round"/>
                                            <circle cx="12" cy="12" r="4"/>
                                            <path d="M9 12l2 2 4-4" strokeLinecap="round" strokeLinejoin="round"/>
                                        </svg>
                                    </div>
                                    <h3 className="text-3xl font-black text-slate-300 mb-2">Analysis Dashboard</h3>
                                    <p className="text-slate-300 font-bold uppercase tracking-widest text-xs">Activate Relocation Mode</p>
                                </div>
                            ) : (
                                /* Results Dashboard */
                                <div className="space-y-6 animate-in fade-in zoom-in-95 duration-500">
                                    {view === 'compare' && dataB && (
                                        <div className="bg-[#10B981] text-white p-5 rounded-3xl text-center shadow-lg shadow-emerald-50">
                                            <p className="font-bold text-sm">
                                                Verdict: {dataB.surplus > dataA.surplus ? dataB.rawName : dataA.rawName} saves you ${annualSavingsDiff.toLocaleString()} more per year!
                                            </p>
                                        </div>
                                    )}

                                    <div className={`grid gap-6 ${view === 'compare' ? 'md:grid-cols-2' : 'max-w-2xl mx-auto w-full'}`}>
                                        {[dataA, ...(view === 'compare' && dataB ? [dataB] : [])].map((city, idx) => (
                                            <div key={idx} className="glass-card p-10 flex flex-col">
                                                <div className="flex justify-between items-start mb-10">
                                                    <div>
                                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-2">{city.rawName.split(',')[0]}</h2>
                                                        <span className="bg-blue-50 text-[#2563EB] text-[10px] font-black px-3 py-1 rounded-full uppercase">Risk Score: {city.risk}/100</span>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Monthly Surplus</p>
                                                        <p className={`text-4xl font-black ${city.surplus >= 0 ? 'text-[#10B981]' : 'text-rose-500'}`}>
                                                            ${city.surplus.toLocaleString()}
                                                        </p>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-y-10 gap-x-12">
                                                    <StatItem label="Rent" val={city.rent} color="#3B82F6" total={city.total} />
                                                    <StatItem label="Food" val={city.food} color="#F59E0B" total={city.total} />
                                                    <StatItem label="Transport" val={city.transport} color="#64748B" total={city.total} />
                                                    <StatItem label="Utilities" val={city.utilities} color="#94A3B8" total={city.total} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const StatItem = ({ label, val, color, total }) => (
            <div>
                <div className="flex justify-between text-[11px] font-bold text-slate-400 uppercase mb-3">
                    <span>{label}</span>
                    <span className="text-slate-800">${val.toLocaleString()}</span>
                </div>
                <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div className="h-full transition-all duration-1000" style={{width: `${(val/total)*100}%`, backgroundColor: color}}></div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
